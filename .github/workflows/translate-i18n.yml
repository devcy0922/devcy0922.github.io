name: "LingoAgent — Auto Translate i18n"

# ────────────────────────────────────────────────
# 트리거: ko.json 변경 시 또는 수동 실행
# ────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - "docs/public/locales/ko.json"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (파일 저장 없이 검증만)"
        type: boolean
        default: false
      sync_all:
        description: "전체 키 재번역 (수동 유지보수 전용)"
        type: boolean
        default: false

# 동시 실행 방지 (이전 번역 Job이 완료될 때까지 대기)
concurrency:
  group: lingo-translate
  cancel-in-progress: false

jobs:
  translate:
    name: "Translate ko.json → en / ja"
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 번역 결과 커밋을 위해 필요

    steps:
      # ── 1. 소스 체크아웃 ──
      - name: "Checkout portfolio repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. lingo-agent 레포 체크아웃 (translate.py 사용) ──
      - name: "Checkout lingo-agent"
        uses: actions/checkout@v4
        with:
          repository: devcy0922/lingo-agent
          ref: ca71843221ace030f94387e30b9c7a983d510944
          path: .lingo-agent
          sparse-checkout: |
            translate.py
            requirements-translate.txt

      # ── 3. Python 설정 ──
      - name: "Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ".lingo-agent/requirements-translate.txt"

      # ── 4. 의존성 설치 ──
      - name: "Install LingoAgent dependencies"
        run: pip install -r .lingo-agent/requirements-translate.txt

      # ── 5. 변경 범위 기준 원본 준비 ──
      - name: "Prepare source diff baseline"
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          mkdir -p .lingo/runtime

          if [ "$EVENT_NAME" = "push" ] \
            && [ -n "$BEFORE_SHA" ] \
            && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "$BEFORE_SHA:docs/public/locales/ko.json" 2>/dev/null; then
            git show "$BEFORE_SHA:docs/public/locales/ko.json" > .lingo/runtime/ko.previous.json
            echo "이전 ko.json을 기준으로 added/changed/missing 키를 계산합니다."
          else
            cp docs/public/locales/ko.json .lingo/runtime/ko.previous.json
            echo "기준 커밋이 없어 현재 ko.json을 사용합니다. 누락 키만 자동 번역합니다."
          fi

      # ── 6. 번역 실행 ──
      #    LLM_GATEWAY_URL, LLM_API_KEY, LLM_MODEL 은 GitHub Secrets에서 주입
      #    Fallback 번역 발생 시 exit(1) → Job 실패 → 커밋 차단
      - name: "Run LingoAgent translation pipeline"
        env:
          LLM_GATEWAY_URL: ${{ secrets.LLM_GATEWAY_URL }}
          # PORTFOLIO_DEMO_KEY: Live Demo와 동일한 GCP API Gateway 키 재사용
          LLM_API_KEY: ${{ secrets.PORTFOLIO_DEMO_KEY }}
          LLM_TRANSLATION_MODEL: ${{ vars.LINGO_TRANSLATION_MODEL || 'auto' }}
          LLM_REVIEW_MODEL: ${{ vars.LINGO_REVIEW_MODEL || 'auto' }}
          # 공개 Demo Key의 낮은 RPM 정책을 준수한다. 전용 CI Key 도입 후 변수로 조정한다.
          LLM_MIN_REQUEST_INTERVAL_SECONDS: ${{ vars.LINGO_REQUEST_INTERVAL_SECONDS || '15' }}
        run: |
          set -euo pipefail
          DRY_RUN_FLAG=""
          SYNC_ALL_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          if [ "${{ github.event.inputs.sync_all }}" = "true" ]; then
            SYNC_ALL_FLAG="--sync-all"
          fi

          python .lingo-agent/translate.py \
            --source docs/public/locales/ko.json \
            --base-source .lingo/runtime/ko.previous.json \
            --langs en-US ja-JP \
            --output docs/public/locales/ \
            --glossary .lingo/glossary.json \
            --report .lingo/runtime/report.json \
            $DRY_RUN_FLAG \
            $SYNC_ALL_FLAG

      - name: "Upload LingoAgent QA evidence"
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: lingo-agent-qa-${{ github.run_id }}
          path: .lingo/runtime/report.json
          if-no-files-found: warn

      # ── 7. 번역 결과 커밋 ──
      - name: "Commit translated locale files"
        if: ${{ success() && github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          git config --global user.name  "LingoAgent[bot]"
          git config --global user.email "lingo-agent@devcy0922.github.io"

          git add docs/public/locales/en.json
          git add docs/public/locales/ja.json

          # 변경사항이 있을 때만 커밋
          if git diff --cached --quiet; then
            echo "번역 파일에 변경사항 없음 — 커밋 생략"
          else
            EN_QA="$(jq -r '.languages[] | select(.language == "en-US") | "\(.qa_status)(\(.qa_score))"' .lingo/runtime/report.json)"
            JA_QA="$(jq -r '.languages[] | select(.language == "ja-JP") | "\(.qa_status)(\(.qa_score))"' .lingo/runtime/report.json)"
            UPDATED="$(jq '[.languages[].scope.selected[]] | unique | length' .lingo/runtime/report.json)"
            PRESERVED="$(jq '[.languages[].scope.preserved_count] | min' .lingo/runtime/report.json)"
            REVIEWED="$(jq '[.languages[].reviewed_keys] | add' .lingo/runtime/report.json)"

            git commit -m "chore(i18n): auto-translate via LingoAgent

            Source: docs/public/locales/ko.json
            Langs: en-US, ja-JP
            LingoAgent: ca71843221ace030f94387e30b9c7a983d510944
            Updated source keys: $UPDATED
            Preserved existing keys: $PRESERVED
            Reviewed translations: $REVIEWED
            QA: en-US=$EN_QA, ja-JP=$JA_QA
            Triggered by: ${{ github.sha }}"

            git push
          fi
